<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" http-equiv="refresh" content="0; url=http://localhost:5001">
    <title>小红书笔记ID转链接 - 网页版</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background: #f5f5f7;
            color: #1d1d1f;
        }
        .loading {
            text-align: center;
        }
        .spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid #e5e5ea;
            border-top-color: #fe2c55;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        p { font-size: 16px; color: #6e6e73; }
    </style>
</head>
<body>
    <div class="loading">
        <div class="spinner"></div>
        <p>正在启动服务，请稍候...</p>
        <p><small>如果没有自动跳转，<a href="http://localhost:5001">点击这里</a></small></p>
    </div>
</body>
</html>
