<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍠 小红书笔记ID转链接</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
:root{--bg:#f5f5f7;--surface:#fff;--border:#e5e5ea;--accent:#fe2c55;--accent-hover:#e8264a;--text:#1d1d1f;--text2:#6e6e73;--text3:#aeaeb2;--shadow:0 1px 3px rgba(0,0,0,.08);--radius:12px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Inter','Segoe UI',sans-serif;background:var(--bg);color:var(--text);line-height:1.6}
.container{max-width:800px;margin:0 auto;padding:24px 20px}
.header{display:flex;align-items:center;justify-content:space-between;padding:20px 24px;background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:20px;border:1px solid var(--border)}
.logo{display:flex;align-items:center;gap:14px}
.logo-icon{font-size:32px;line-height:1}
.logo-text h1{font-size:20px;font-weight:700}
.subtitle{font-size:13px;color:var(--text2);margin-top:2px}
.card{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);border:1px solid var(--border);padding:24px;margin-bottom:16px}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.card-header h2{font-size:17px;font-weight:600}
.hint{font-size:12px;color:var(--text3)}
.textarea{width:100%;padding:14px 16px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;font-family:'SF Mono','Menlo',monospace;resize:vertical;background:var(--bg);color:var(--text);line-height:1.7;min-height:100px;transition:border-color .2s}
.textarea:focus{outline:none;border-color:var(--accent);background:var(--surface);box-shadow:0 0 0 3px rgba(254,44,85,.15)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border:none;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;transition:all .2s}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent-hover);box-shadow:0 2px 8px rgba(254,44,85,.4)}
.btn-secondary{background:#f8f8fa;color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{background:#e5e5ea}
.btn-large{width:100%;justify-content:center;padding:16px 24px;font-size:16px;font-weight:600;margin-top:16px}
.btn-sm{padding:6px 12px;font-size:12px}
.tab-bar{display:flex;gap:4px;background:#f8f8fa;padding:4px;border-radius:8px;margin-bottom:16px}
.tab{flex:1;padding:10px 16px;border:none;border-radius:6px;background:transparent;font-size:13px;font-weight:500;cursor:pointer;color:var(--text2);transition:all .2s}
.tab:hover{color:var(--text)}
.tab.active{background:var(--surface);color:var(--text);box-shadow:var(--shadow)}
.tab-content{display:none}.tab-content.active{display:block}
.result-item{display:flex;align-items:flex-start;gap:12px;padding:12px 14px;border-radius:8px;margin-bottom:6px;background:#f8f8fa;transition:all .2s}
.result-item.ok{background:#f0fff4}.result-item.err{background:#fff0f0}
.result-content{flex:1;min-width:0}
.result-id{font-size:12px;font-weight:600;color:var(--text2);font-family:monospace;margin-bottom:4px}
.result-url{font-size:13px;color:var(--accent);word-break:break-all;line-height:1.4}
.result-url a{color:var(--accent);text-decoration:none}
.step-box{font-size:13px;color:var(--text2);line-height:1.8;padding:12px 14px;background:#f8f8fa;border-radius:8px;margin-bottom:12px}
.step-box b{color:var(--accent)}
.script-box{background:#1a1a2e;color:#e94560;padding:12px;border-radius:8px;font-size:10px;font-family:Menlo,monospace;line-height:1.6;max-height:120px;overflow:auto;cursor:pointer;margin-bottom:8px}
.footer{text-align:center;padding:20px;font-size:12px;color:var(--text3)}
.info{font-size:12px;color:var(--text2);margin-top:6px}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:12px}
.stat-item{text-align:center;padding:12px;background:#f8f8fa;border-radius:8px}
.stat-value{font-size:24px;font-weight:700}
.stat-label{font-size:12px;color:var(--text2);margin-top:2px}
@media(max-width:640px){.container{padding:16px 12px}.header{flex-direction:column;gap:12px;align-items:flex-start}.stats-grid{gap:8px}.stat-value{font-size:20px}}
</style>
</head>
<body>
<div class="container">
<header class="header">
<div class="logo">
<span class="logo-icon">🍠</span>
<div class="logo-text"><h1>小红书笔记ID转链接</h1><p class="subtitle">ID转链接 · 链接提取 · 达人信息</p></div>
</div>
</header>

<main class="main">
<div class="tab-bar">
<button class="tab active" onclick="switchTab(1,this)">📝 ID → 链接</button>
<button class="tab" onclick="switchTab(2,this)">🔗 提取笔记信息</button>
</div>

<!-- Tab 1: ID→链接 -->
<div class="tab-content active" id="tab1">
<section class="card">
<div class="card-header"><h2>📝 输入笔记ID</h2><span class="hint">多个用逗号或换行分隔</span></div>
<div class="step-box">
<b>①</b> 打开 <a href="https://ad.xiaohongshu.com/" target="_blank">ad.xiaohongshu.com</a> 登录<br>
<b>②</b> 按 F12 → Console（控制台）<br>
<b>③</b> 点下面代码框全选 → Ctrl+C 复制<br>
<b>④</b> 控制台 Ctrl+V → 回车 → 弹窗操作
</div>
<div class="script-box" onclick="sel(this)"></div>
</section>
</div>

<!-- Tab 2: 提取信息 -->
<div class="tab-content" id="tab2">
<section class="card">
<div class="card-header"><h2>🔗 提取笔记信息</h2><span class="hint">粘贴链接自动提取</span></div>
<textarea class="textarea" id="input" rows="4" placeholder="粘贴链接，多个用逗号或换行分隔&#10;https://www.xiaohongshu.com/explore/..."></textarea>
<div style="display:flex;align-items:center;justify-content:space-between;margin-top:10px">
<span class="hint" id="count">已输入 0 条</span>
<button class="btn btn-primary btn-sm" onclick="run()">🔍 提取</button>
</div>
<div id="result" style="margin-top:12px"></div>
</section>
</div>

<section class="card" id="resultCard" style="display:none">
<div class="card-header"><h2>✅ 结果</h2>
<div><button class="btn btn-secondary btn-sm" onclick="copyAll()">📋 复制全部</button></div>
</div>
<div id="resultList"></div>
<div id="statsCard"></div>
</section>
</main>

<footer class="footer"><p>仅供内部使用</p></footer>
</div>

<script>
var SCRIPT="(function(){if(document.getElementById('x'))return;var d=document.createElement('div');d.id='x';d.style.cssText='position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:99999;background:#fff;border-radius:14px;padding:20px;box-shadow:0 10px 40px rgba(0,0,0,.3);width:520px;max-width:90vw;font-family:-apple-system,sans-serif;';d.innerHTML='<h2 style=\"margin:0 0 10px;font-size:18px\">🍠 笔记ID转链接</h2><textarea id=\"i\" style=\"width:100%;padding:10px;border:2px solid #ddd;border-radius:8px;font-size:14px;min-height:80px;font-family:monospace\" placeholder=\"粘贴笔记ID，多个用逗号分隔\"></textarea><div style=\"margin:4px 0;font-size:12px;color:#999\" id=\"c\">已输入 0 个ID</div><button onclick=\"r()\" style=\"width:100%;padding:12px;border:none;border-radius:8px;background:#fe2c55;color:#fff;font-size:16px;font-weight:600;cursor:pointer\">转换</button><div id=\"o\" style=\"margin-top:10px;max-height:350px;overflow-y:auto;font-size:14px\"></div><button onclick=\"this.parentElement.remove()\" style=\"position:absolute;top:8px;right:12px;border:none;background:none;font-size:24px;cursor:pointer\">×</button>';document.body.appendChild(d);var i=document.getElementById('i');i.oninput=function(){document.getElementById('c').textContent='已输入 '+this.value.split(/[,\\\n]+/).filter(function(n){return n.trim()}).length+' 个ID'};window.r=function(){var v=document.getElementById('i').value,ids=v.split(/[,\\\n]+/).map(function(n){return n.trim()}).filter(Boolean),o=document.getElementById('o');if(!ids.length)return alert('请输入ID');fetch('/api/light/note/token',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({noteIds:ids,source:'pc_ad'})}).then(function(r){return r.json()}).then(function(j){if(j.code==0&&j.data){o.innerHTML=ids.map(function(id){var t=typeof j.data[id]=='string'?j.data[id]:(j.data[id]&&j.data[id].xsec_token?j.data[id].xsec_token:'');if(t){var u='https://www.xiaohongshu.com/explore/'+id+'?xsec_token='+t;return '<div style=\"padding:8px;border-radius:8px;background:#f0fff4;margin-bottom:6px;font-size:13px\"><div style=\"font-size:11px;color:#999\">'+id+'</div><div style=\"word-break:break-all;color:#fe2c55\">'+u+'</div><button onclick=\"navigator.clipboard.writeText(\\''+u+'\\\');this.textContent=\\'✅ 复制成功\\'\" style=\"border:none;background:#fe2c55;color:#fff;padding:3px 8px;border-radius:4px;font-size:11px;cursor:pointer;margin-top:4px\">复制</button></div>'}return '<div style=\"padding:8px;border-radius:8px;background:#fff0f0;margin:6px 0;color:#e74c3c;font-size:13px\">❌'+id+' 获取失败</div>'}).join('')}else o.innerHTML='<div style=\"color:#e74c3c;font-size:13px\">错误:'+(j.msg||'请检查Cookie')+'</div>'}).catch(function(e){o.innerHTML='<div style=\"color:#e74c3c;font-size:13px\">请求失败:'+e.message+'</div>'})}})()";
document.querySelector('.script-box').textContent=SCRIPT;

function sel(e){var r=document.createRange();r.selectNodeContents(e);var s=window.getSelection();s.removeAllRanges();s.addRange(r)}

function switchTab(n,el){
document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active')});el.classList.add('active')
document.getElementById('tab1').classList.toggle('active',n===1);document.getElementById('tab2').classList.toggle('active',n===2)
document.getElementById('resultCard').style.display='none'
}

document.getElementById('input').addEventListener('input',function(){
document.getElementById('count').textContent='已输入 '+this.value.split(/[,\n]+/).filter(function(x){return x.trim()}).length+' 条'})

function parse(s){
var id=null,t='';var m=s.match(/explore\/([a-f0-9]{24})/i);if(!m)m=s.match(/discovery\/item\/([a-f0-9]{24})/i)
if(!m&&/^[a-f0-9]{24}$/i.test(s.trim()))id=s.trim()
if(m)id=m[1];if(!id)return null
var mt=s.match(/xsec_token=([^&]+)/);if(mt)t=mt[1]
return{id:id,token:t}}

window._results=[]
function run(){
var raw=document.getElementById('input').value;var items=raw.split(/[,\n]+/).map(function(x){return x.trim()}).filter(Boolean)
if(!items.length)return alert('请输入链接')
var list=document.getElementById('resultList'),card=document.getElementById('resultCard'),stats=document.getElementById('statsCard')
_results=[];list.innerHTML='';card.style.display='';stats.innerHTML=''
var pending=0
items.forEach(function(s){
var p=parse(s);if(!p){list.innerHTML+='<div class=\"result-item err\"><div style=\"font-size:18px\">❌</div><div class=\"result-content\"><div class=\"result-id\">无法识别</div></div></div>';return}
_results.push({id:p.id})
pending++
var item=document.createElement('div');item.className='result-item ok';item.id='ri_'+p.id
item.innerHTML='<div style=\"font-size:18px\">✅</div><div class=\"result-content\"><div class=\"result-id\">'+p.id+'</div><div style=\"font-size:12px;color:var(--text2)\" id=\"rd_'+p.id+'\">⏳ 加载达人信息...</div></div>'
list.appendChild(item)
if(p.token){
fetch('http://localhost:5001/api/note_info',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({noteId:p.id,xsecToken:p.token})})
.then(function(r){return r.json()})
.then(function(res){pending--
var e=document.getElementById('rd_'+p.id);if(e){
if(res.success&&res.data){e.innerHTML='👤 '+res.data.nickname+' &nbsp;|&nbsp; 🕐 '+fmtTime(res.data.time);_results[_results.length-1].nickname=res.data.nickname}
else e.innerHTML='⚠️ 详情加载失败（需启动本地服务）'}})}})}

function fmtTime(t){if(!t)return'未知';if(t.includes('-'))return t;var d=new Date(t);if(isNaN(d.getTime()))return t;return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate()+' '+d.getHours()+':'+d.getMinutes()}

window.copyAll=function(){var ids=_results.map(function(r){return r.id}).join('\n');if(!ids){alert('无结果');return};var ta=document.createElement('textarea');ta.value=ids;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);alert('✅ 已复制 '+_results.length+' 个ID')}
</script>
</body>
</html>
