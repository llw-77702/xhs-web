<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍠 小红书笔记工具</title>
<style>
:root{--bg:#ffffff;--surface:#fff;--border:#e5e5ea;--accent:#fe2c55;--text:#1d1d1f;--text2:#6e6e73;--text3:#aeaeb2}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);padding:24px 20px}
.container{max-width:800px;margin:0 auto}
.header{display:flex;align-items:center;gap:12px;padding:16px 20px;background:var(--surface);border-radius:16px;box-shadow:0 1px 3px rgba(0,0,0,.08);border:1px solid var(--border);margin-bottom:16px}
.header .icon{font-size:28px}
.header h1{font-size:18px;font-weight:700}
.header p{font-size:12px;color:var(--text2)}
.card{background:var(--surface);border-radius:12px;padding:20px;margin-bottom:12px;border:1px solid var(--border);box-shadow:0 1px 3px rgba(0,0,0,.06)}
.card h2{font-size:15px;font-weight:600;margin-bottom:8px}
.card p{font-size:12px;color:var(--text2);margin-bottom:10px;line-height:1.5}
textarea{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-family:'SF Mono',Menlo,monospace;resize:vertical;background:var(--bg);color:var(--text);min-height:80px}
textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(254,44,85,.15)}
.btn{display:block;width:100%;padding:12px;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;margin-top:10px;text-align:center}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{box-shadow:0 2px 8px rgba(254,44,85,.4)}
.btn-secondary{background:var(--bg);color:var(--text);border:1px solid var(--border);margin-top:0}
.btn-secondary:hover{background:#fee}
.btn-sm{display:inline-block;width:auto;padding:5px 10px;font-size:11px;border-radius:6px;background:var(--accent);color:#fff;border:none;cursor:pointer}
.count{font-size:12px;color:var(--text3);margin-top:4px}
.tabs{display:flex;gap:4px;margin-bottom:12px;background:var(--bg);padding:3px;border-radius:8px}
.tab{flex:1;padding:8px;border:none;border-radius:6px;font-size:13px;font-weight:500;cursor:pointer;background:transparent;color:var(--text2);transition:all .2s}
.tab.active{background:var(--surface);color:var(--text);box-shadow:0 1px 2px rgba(0,0,0,.08)}
.hidden{display:none}
.result{padding:8px 10px;border-radius:8px;margin-bottom:6px;background:var(--bg);font-size:13px;line-height:1.6}
.result .lab{font-size:11px;color:var(--text3)}
.result .val{font-weight:600;color:var(--text)}
.result .val-link{color:var(--accent);word-break:break-all;font-size:12px}
.result.ok{background:#f0fff4}.result.err{background:#fff0f0}
.result .copy-btn{border:none;background:var(--accent);color:#fff;padding:3px 8px;border-radius:4px;font-size:11px;cursor:pointer;float:right}
.script-box{background:#1a1a2e;color:#e94560;padding:10px;border-radius:8px;font-size:10px;font-family:Menlo,monospace;line-height:1.6;max-height:120px;overflow:auto;cursor:pointer}
.footer{text-align:center;font-size:11px;color:var(--text3);margin-top:16px}
.hint{font-size:11px;color:var(--text3);margin-top:6px}
.step{font-size:12px;color:var(--text2);line-height:1.8}
.step b{color:var(--accent)}
</style>
</head>
<body>
<div class="container">
<div class="header">
<span class="icon">🍠</span>
<div><h1>小红书笔记工具</h1><p>ID转链接 · 链接提取 · 达人信息</p></div>
</div>

<div class="card">
<div class="tabs">
<button class="tab active" onclick="st(1,this)">📝 ID → 链接</button>
<button class="tab" onclick="st(2,this)">🔗 提取笔记信息</button>
</div>

<!-- Tab 1: ID→链接 -->
<div id="t1">
<p>需要在小红书广告平台页面中运行</p>
<div class="step">
<b>①</b> 打开 <a href="https://ad.xiaohongshu.com/" target="_blank">ad.xiaohongshu.com</a> 登录<br>
<b>②</b> 按 F12 → Console<br>
<b>③</b> 点下面代码框全选 → Ctrl+C 复制<br>
<b>④</b> 控制台 Ctrl+V → 回车
</div>
<div class="script-box" onclick="sel(this)"></div>
<p class="hint">💡 点击代码框全选 → Ctrl+C 复制</p>
</div>

<!-- Tab 2: 提取信息 -->
<div id="t2" class="hidden">
<p>粘贴链接，自动提取笔记ID、达人名称、发布时间</p>
<textarea id="input" placeholder="粘贴链接，多个用逗号或换行分隔&#10;https://www.xiaohongshu.com/explore/..."></textarea>
<div class="count" id="count">已输入 0 条</div>
<button class="btn btn-primary" onclick="run()">🔍 提取</button>
<div id="result"></div>
</div>
</div>

<div class="footer">数据来自小红书公开页面</div>
</div>

<script>
var SCRIPT="(function(){if(document.getElementById('x'))return;var d=document.createElement('div');d.id='x';d.style.cssText='position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:99999;background:#fff;border-radius:14px;padding:20px;box-shadow:0 10px 40px rgba(0,0,0,.3);width:520px;max-width:90vw;font-family:-apple-system,sans-serif;';d.innerHTML='<h2 style=\"margin:0 0 10px;font-size:18px\">🍠 笔记ID转链接</h2><textarea id=\"i\" style=\"width:100%;padding:10px;border:2px solid #ddd;border-radius:8px;font-size:14px;min-height:80px;font-family:monospace\" placeholder=\"粘贴笔记ID，多个用逗号分隔\"></textarea><div style=\"margin:4px 0;font-size:12px;color:#999\" id=\"c\">已输入 0 个ID</div><button onclick=\"r()\" style=\"width:100%;padding:12px;border:none;border-radius:8px;background:#fe2c55;color:#fff;font-size:16px;font-weight:600;cursor:pointer\">转换</button><div id=\"o\" style=\"margin-top:10px;max-height:350px;overflow-y:auto;font-size:14px\"></div><button onclick=\"this.parentElement.remove()\" style=\"position:absolute;top:8px;right:12px;border:none;background:none;font-size:24px;cursor:pointer\">×</button>';document.body.appendChild(d);var i=document.getElementById('i');i.oninput=function(){document.getElementById('c').textContent='已输入 '+this.value.split(/[,\\\n]+/).filter(function(n){return n.trim()}).length+' 个ID'};window.r=function(){var v=document.getElementById('i').value,ids=v.split(/[,\\\n]+/).map(function(n){return n.trim()}).filter(Boolean),o=document.getElementById('o');if(!ids.length)return alert('请输入ID');fetch('/api/light/note/token',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({noteIds:ids,source:'pc_ad'})}).then(function(r){return r.json()}).then(function(j){if(j.code==0&&j.data){o.innerHTML=ids.map(function(id){var t=typeof j.data[id]=='string'?j.data[id]:(j.data[id]&&j.data[id].xsec_token?j.data[id].xsec_token:'');if(t){var u='https://www.xiaohongshu.com/explore/'+id+'?xsec_token='+t;return '<div style=\"padding:8px;border-radius:8px;background:#f0fff4;margin-bottom:6px;font-size:13px\"><div style=\"font-size:11px;color:#999\">'+id+'</div><div style=\"word-break:break-all;color:#fe2c55\">'+u+'</div><button onclick=\"navigator.clipboard.writeText(\\''+u+'\\\');this.textContent=\\'✅ 复制成功\\'\" style=\"border:none;background:#fe2c55;color:#fff;padding:3px 8px;border-radius:4px;font-size:11px;cursor:pointer;margin-top:4px\">复制</button></div>'}return '<div style=\"padding:8px;border-radius:8px;background:#fff0f0;margin:6px 0;color:#e74c3c;font-size:13px\">❌'+id+' 获取失败</div>'}).join('')}else o.innerHTML='<div style=\"color:#e74c3c;font-size:13px\">错误:'+(j.msg||'请检查Cookie')+'</div>'}).catch(function(e){o.innerHTML='<div style=\"color:#e74c3c;font-size:13px\">请求失败:'+e.message+'</div>'})}})()";
document.querySelector('.script-box').textContent = SCRIPT;

function sel(e){var r=document.createRange();r.selectNodeContents(e);var s=window.getSelection();s.removeAllRanges();s.addRange(r)}

function st(n,el){
document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active')});el.classList.add('active');
document.getElementById('t1').classList.toggle('hidden',n!==1);document.getElementById('t2').classList.toggle('hidden',n!==2)
}

document.getElementById('input').addEventListener('input',function(){
document.getElementById('count').textContent='已输入 '+this.value.split(/[,\n]+/).filter(function(x){return x.trim()}).length+' 条'})

function parse(s){
var id=null,t='';var m=s.match(/explore\/([a-f0-9]{24})/i);if(!m){m=s.match(/discovery\/item\/([a-f0-9]{24})/i)}if(!m&&/^[a-f0-9]{24}$/i.test(s.trim()))id=s.trim()
if(m)id=m[1];if(!id)return null
var mt=s.match(/xsec_token=([^&]+)/);if(mt)t=mt[1]
return{id:id,token:t}}

function run(){
var raw=document.getElementById('input').value;var items=raw.split(/[,\n]+/).map(function(x){return x.trim()}).filter(Boolean)
if(!items.length)return alert('请输入链接')
var html='',server='http://localhost:5001',done=0
items.forEach(function(s){
var p=parse(s)
if(!p){html+='<div class=\"result err\">❌ 无法识别</div>';done++;if(done==items.length)show(html);return}
done++
var cid='c'+p.id
html+='<div class=\"result ok\" id=\"'+cid+'\"><div class=\"lab\">笔记ID</div><div style=\"font-size:15px;font-weight:700;margin:2px 0\">'+p.id+'</div><div class=\"lab\">达人</div><div id=\"'+cid+'_n\">⏳</div><div class=\"lab\">时间</div><div id=\"'+cid+'_t\">⏳</div></div>'
if(done==items.length)show(html)
if(p.token){
fetch(server+'/api/note_info',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({noteId:p.id,xsecToken:p.token})}).then(function(r){return r.json()}).then(function(res){
if(res.success&&res.data){
var e1=document.getElementById(cid+'_n');if(e1)e1.textContent=res.data.nickname||'未知'
var e2=document.getElementById(cid+'_t');if(e2){var ts=res.data.time;if(ts){var d=new Date(ts);if(!isNaN(d.getTime())){ts=d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate()+' '+d.getHours()+':'+d.getMinutes()}}e2.textContent=ts||'未知'}
}})}})
}
function show(h){document.getElementById('result').innerHTML=h+'<div style=\"text-align:center;margin-top:6px\"><button class=\"btn btn-secondary btn-sm\" onclick=\"cids()\">📋 复制全部ID</button></div>'}
window.cids=function(){var items=document.getElementById('input').value.split(/[,\n]+/).map(function(x){return x.trim()}).filter(Boolean);var ids=items.map(function(s){var p=parse(s);return p?p.id:''}).filter(Boolean).join('\n');if(!ids)return alert('无ID');var ta=document.createElement('textarea');ta.value=ids;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);alert('✅ 已复制')};
</script>
</body>
</html>
